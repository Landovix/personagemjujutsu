<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="aula9.css">
</head>
<body>
   <header class="topo">
        <section class="container">
            <div class="container-nome-personagem">
                <p>Nome personagem</p>
                <input type="text" name="nome" id="nome" placeholder="Digite o nome do personagem" title="Nome do personagem">
            </div>
            <div class="container-tipo-de-feiticeiro">
                <p>Tipo de feiticeiro</p>
                <input type="text" name="tipo-feiticeiro" id="tipo-feiticeiro" placeholder="Digite o tipo de feiticeiro" title="Tipo de feiticeiro">
            </div>
            <div class="container-classe-personagem">
                <p>Classe</p>
                <input type="text" name="classe" id="classe" placeholder="Digite a classe do personagem" title="Classe do personagem">
            </div>
            <div class="container-nome-jogador">
                <p>Nome jogador</p>
                <input type="text" name="nome-jogador" id="nome-jogador" placeholder="Digite o nome do jogador" title="Nome do jogador">
            </div>
            <div class="container-feitiço">
                <p>Feitiço</p>
                <input type="text" name="feitiço" id="feitiço" placeholder="Digite o nome do feitiço" title="Nome do feitiço">
            </div>
            <div class="container-nome-arma-amaldiçoada">
                <p>Nome arma amaldiçoada</p>
                <input type="text" name="nome-arma-amaldiçoada" id="nome-arma-amaldiçoada" placeholder="Digite o nome da arma amaldiçoada" title="Nome da arma amaldiçoada">
            </div>
        </section>
   </header>
   <main>
        <section class = "container-principal">
            <div>
                <div class = "container-vde">
                    <div class = "container-vida">
                        <p>Vida</p>
                        <input type="text" name="vida" id="vida" placeholder="Digite o valor de vida" title="Valor de vida">
                    </div>
                    <div class="container-defesa">
                        <p>Defesa</p>
                        <input type="text" name="defesa" id="defesa" placeholder="Digite o valor de defesa" title="Valor de defesa">
                    </div>
                    <div class="container-energia-amaldiçoada">
                        <p>Energia amaldiçoada</p>
                        <input type="text" name="energia-amaldiçoada" id="energia-amaldiçoada" placeholder="Digite o valor de energia amaldiçoada" title="Valor de energia amaldiçoada">
                    </div>
                </div>
                
            </div>
        </section>
                <section class="atributos">

                <div class="container-atributos">
                    <div class="container-for">
                        <p>FOR</p>
                        <input type="text" name="for" id="for" placeholder="Digite o valor de FOR" title="Valor de FOR">
                    </div>
                    <div class="container-sab">
                     <p>SAB</p>
                        <input type="text" name="sab" id="sab" placeholder="Digite o valor de SAB" title="Valor de SAB">
                    </div>
                    <div class="container-dex">
                        <p>DEX</p>
                        <input type="text" name="dex" id="dex" placeholder="Digite o valor de DEX" title="Valor de DEX">
                    </div>
                    <div class="container-con">
                        <p>CON</p>
                        <input type="text" name="con" id="con" placeholder="Digite o valor de CON" title="Valor de CON">
                    </div>
                    <div class="container-int">
                        <p>INT</p>
                        <input type="text" name="int" id="int" placeholder="Digite o valor de INT" title="Valor de INT">
                    </div>
                </div>
            <div class = "container-imagem">
                <img src="images (2).jpg" alt="Imagem do personagem">
            </div>
            <div class="biografia">
                <p>Biografia</p>
                <textarea name="biografia" id="biografia" placeholder="Digite a biografia do personagem" title="Biografia do personagem" rows="23" cols="33"></textarea>
            </div>
        </section>


   </main>
   <footer>
    <div class="copyright">
        <a href="">&copy Davi Del Maestro Feu Rosa</a>
    </div>
   </footer> 
</body>
</html>
